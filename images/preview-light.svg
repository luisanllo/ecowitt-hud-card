<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif">
  <rect x="0" y="0" width="400" height="600" rx="14" fill="#ffffff"/>
  <rect x="1" y="1" width="398" height="598" rx="13" fill="none" stroke="#e7e7ea" stroke-width="1.5"/>

  <!-- title -->
  <text x="24" y="38" font-size="13" font-weight="600" fill="#70788a" letter-spacing="0.3">Weather Station</text>

  <!-- hero: weather icon (partly cloudy) -->
  <g transform="translate(24,50)">
    <circle cx="24" cy="20" r="13" fill="#f0b93e"/>
    <ellipse cx="20" cy="34" rx="20" ry="13" fill="#c7ccd3"/>
    <ellipse cx="34" cy="30" rx="14" ry="10" fill="#c7ccd3"/>
  </g>

  <!-- temp block -->
  <text x="88" y="90" font-size="40" font-weight="600" fill="#1c2128">22.5<tspan font-size="18" fill="#e08a1e">°C</tspan></text>
  <text x="88" y="109" font-size="12" fill="#70788a">Feels like 24.0° · Partly cloudy</text>
  <text x="88" y="127" font-size="11" fill="#70788a">
    <tspan fill="#d1481c" font-weight="700">↑</tspan> 27.3°<tspan fill="#8a92a3"> 15:10</tspan>
    <tspan dx="14" fill="#3b82c4" font-weight="700">↓</tspan> 14.2°<tspan fill="#8a92a3"> 07:40</tspan>
  </text>

  <!-- battery -->
  <g transform="translate(340,54)">
    <rect x="0" y="0" width="18" height="10" rx="2" fill="none" stroke="#2ba86a" stroke-width="1.4"/>
    <rect x="18" y="3" width="2.5" height="4" fill="#2ba86a"/>
    <rect x="1.5" y="1.5" width="13" height="7" rx="1" fill="#2ba86a"/>
    <text x="24" y="9" font-size="15" font-weight="600" fill="#1c2128">82%</text>
  </g>
  <text x="400" y="80" font-size="9" fill="#70788a" text-anchor="end" transform="translate(-22,0)">Station battery</text>

  <line x1="22" y1="148" x2="378" y2="148" stroke="#e7e7ea" stroke-width="1"/>

  <!-- trend -->
  <text x="22" y="168" font-size="9" font-weight="600" fill="#8a92a3" letter-spacing="0.5">TEMPERATURE TREND (6H)</text>
  <polygon points="22,198 22,186 60,180 100,172 140,176 180,182 220,186 260,188 300,190 340,191 378,192 378,198"
           fill="#2ba86a" opacity="0.14"/>
  <polyline points="22,186 60,180 100,172 140,176 180,182 220,186 260,188 300,190 340,191 378,192"
            fill="none" stroke="#2ba86a" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="22" y="210" font-size="9" fill="#8a92a3">14.2°</text>
  <text x="378" y="210" font-size="9" fill="#8a92a3" text-anchor="end">27.3°</text>

  <line x1="22" y1="222" x2="378" y2="222" stroke="#e7e7ea" stroke-width="1"/>

  <!-- sun bar -->
  <g transform="translate(0,240)">
    <circle cx="30" cy="0" r="7" fill="#f5a623"/>
    <path d="M30,-11 L30,-13 M30,11 L30,13 M19,0 L17,0 M41,0 L43,0 M22.2,-7.8 L20.8,-9.2 M37.8,7.8 L39.2,9.2 M22.2,7.8 L20.8,9.2 M37.8,-7.8 L39.2,-9.2"
          stroke="#f5a623" stroke-width="1.4" stroke-linecap="round"/>
    <text x="46" y="4" font-size="11" fill="#70788a">07:12</text>
    <line x1="90" y1="0" x2="310" y2="0" stroke="#e7e7ea" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="0" x2="200" y2="0" stroke="url(#sunGradLight)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="0" r="6.5" fill="#f5a623"/>
    <text x="330" y="4" font-size="11" fill="#70788a" text-anchor="end">22:01</text>
    <g transform="translate(354,0)">
      <circle cx="0" cy="0" r="7" fill="#f5a623"/>
      <path d="M0,-11 L0,-13 M0,11 L0,13 M-11,0 L-13,0 M11,0 L13,0 M-7.8,-7.8 L-9.2,-9.2 M7.8,7.8 L9.2,9.2 M-7.8,7.8 L-9.2,9.2 M7.8,-7.8 L9.2,-9.2"
            stroke="#f5a623" stroke-width="1.4" stroke-linecap="round"/>
    </g>
  </g>
  <defs>
    <linearGradient id="sunGradLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffd27a"/>
    </linearGradient>
  </defs>
  <text x="200" y="264" font-size="9.5" fill="#8a92a3" text-anchor="middle">Nightfall in 4h 12min</text>

  <line x1="22" y1="278" x2="378" y2="278" stroke="#e7e7ea" stroke-width="1"/>

  <!-- wind -->
  <g transform="translate(56,320)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#e7e7ea" stroke-width="1.4"/>
    <g transform="rotate(315)">
      <path d="M0,-18 L7,6 L0,1 L-7,6 Z" fill="#3b82c4"/>
    </g>
  </g>
  <text x="100" y="312" font-size="20" font-weight="600" fill="#1c2128">3.4<tspan font-size="11" fill="#70788a" font-weight="400"> km/h</tspan></text>
  <text x="100" y="328" font-size="11" fill="#70788a">Wind from NW (315°)</text>
  <text x="100" y="345" font-size="11.5" fill="#8a92a3">Gust 6.1 km/h</text>

  <line x1="22" y1="362" x2="378" y2="362" stroke="#e7e7ea" stroke-width="1"/>

  <!-- stat grid row 1 -->
  <g font-size="16" font-weight="600" fill="#1c2128">
    <text x="22" y="392">62<tspan font-size="12" fill="#70788a" font-weight="400">%</tspan></text>
    <text x="112" y="392">14.6<tspan font-size="12" fill="#70788a" font-weight="400">°</tspan></text>
    <text x="202" y="392">22.5<tspan font-size="12" fill="#70788a" font-weight="400">°</tspan></text>
    <text x="292" y="392" fill="#c78a00">25<tspan font-size="12" fill="#70788a" font-weight="400">°</tspan></text>
  </g>
  <g font-size="9.5" fill="#70788a">
    <text x="22" y="406">Humidity</text>
    <text x="112" y="406">Dew point</text>
    <text x="202" y="406">Wind chill</text>
    <text x="292" y="406">Humidex</text>
  </g>

  <!-- stat grid row 2 -->
  <g font-size="16" font-weight="600">
    <text x="22" y="440" fill="#c78a00">5</text>
    <text x="112" y="440" fill="#c78a00">Moderate (28%)</text>
    <text x="292" y="440" fill="#1c2128">1013</text>
  </g>
  <text x="368" y="440" font-size="12" fill="#c78a00">↗</text>
  <text x="22" y="454" font-size="9.5" fill="#70788a">UV index</text>
  <text x="112" y="454" font-size="9.5" fill="#70788a">Heat risk</text>
  <text x="292" y="454" font-size="9.5" fill="#70788a">Pressure hPa</text>

  <text x="22" y="484" font-size="16" font-weight="600" fill="#1c2128">32.4k</text>
  <text x="22" y="498" font-size="9.5" fill="#70788a">Illuminance lux</text>

  <line x1="22" y1="514" x2="378" y2="514" stroke="#e7e7ea" stroke-width="1"/>

  <!-- rain row -->
  <g transform="translate(22,540)">
    <path d="M0,-10 C4,-4 6,0 6,4 C6,8 3,10.5 0,10.5 C-3,10.5 -6,8 -6,4 C-6,0 -4,-4 0,-10 Z" fill="#8a92a3"/>
  </g>
  <text x="36" y="546" font-size="20" font-weight="600" fill="#1c2128">0.0<tspan font-size="12" fill="#70788a" font-weight="400"> mm/h</tspan></text>
  <text x="22" y="562" font-size="9.5" fill="#8a92a3">No rain</text>

  <text x="150" y="546" font-size="20" font-weight="600" fill="#1c2128">0.0<tspan font-size="12" fill="#70788a" font-weight="400"> mm</tspan></text>
  <text x="150" y="562" font-size="9.5" fill="#8a92a3">Today's total</text>

  <text x="264" y="546" font-size="20" font-weight="600" fill="#1c2128">No rain</text>
  <text x="264" y="562" font-size="9.5" fill="#8a92a3">Rain sensor</text>
</svg>
